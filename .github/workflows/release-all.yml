name: Release All
run-name: Release All - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag override (example: v1.12). Leave empty to auto-increment v1.x."
        required: false
        default: ""
      title:
        description: Optional release title override.
        required: false
        default: ""
      prerelease:
        description: Mark release as prerelease
        required: false
        type: boolean
        default: false
      include_cuda:
        description: Include Windows CUDA build in this release
        required: false
        type: boolean
        default: false

concurrency:
  group: release-all-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  resolve-release-meta:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      title: ${{ steps.meta.outputs.title }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve Tag and Title
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          input_tag="${{ inputs.tag }}"
          if [[ -n "$input_tag" ]]; then
            tag="$input_tag"
          else
            git fetch --tags --force
            last_minor="$(git tag -l 'v1.*' | sed -n 's/^v1\.\([0-9]\+\)$/\1/p' | sort -n | tail -n1)"
            if [[ -z "$last_minor" ]]; then
              next_minor=0
            else
              next_minor=$((last_minor + 1))
            fi
            if (( next_minor > 99 )); then
              echo "Auto-tag reached v1.99 limit. Set workflow input 'tag' (for example v2.0) to continue."
              exit 1
            fi
            tag="v1.${next_minor}"
          fi

          input_title="${{ inputs.title }}"
          if [[ -n "$input_title" ]]; then
            title="$input_title"
          else
            title="Openresearchtools-Engine ${tag}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "title=$title" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $tag"
          echo "Resolved title: $title"

  build-windows-cuda:
    if: ${{ inputs.include_cuda }}
    needs: resolve-release-meta
    uses: ./.github/workflows/windows-x64.yml
    with:
      backend: cuda
    secrets: inherit

  build-windows-vulkan:
    needs: resolve-release-meta
    uses: ./.github/workflows/windows-x64.yml
    with:
      backend: vulkan
    secrets: inherit

  build-macos-metal:
    needs: resolve-release-meta
    uses: ./.github/workflows/macos-arm64.yml
    with:
      backend: metal
    secrets: inherit

  build-ubuntu-vulkan:
    needs: resolve-release-meta
    uses: ./.github/workflows/ubuntu-x64.yml
    secrets: inherit

  publish-release:
    if: ${{ always() && needs.resolve-release-meta.result == 'success' && needs.build-windows-vulkan.result == 'success' && needs.build-macos-metal.result == 'success' && needs.build-ubuntu-vulkan.result == 'success' && (needs.build-windows-cuda.result == 'success' || needs.build-windows-cuda.result == 'skipped') }}
    needs:
      - resolve-release-meta
      - build-windows-cuda
      - build-windows-vulkan
      - build-macos-metal
      - build-ubuntu-vulkan
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.resolve-release-meta.outputs.tag }}
      RELEASE_TITLE: ${{ needs.resolve-release-meta.outputs.title }}
      RELEASE_PRERELEASE: ${{ inputs.prerelease }}
      INCLUDE_CUDA: ${{ inputs.include_cuda }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: engine-*
          path: dist
          merge-multiple: false

      - name: Validate Downloaded Artifacts
        shell: bash
        run: |
          set -euo pipefail
          expected=(
            "engine-win-vulkan-x64"
            "engine-macos-arm64-metal"
            "engine-ubuntu-x64-vulkan"
          )
          if [[ "$INCLUDE_CUDA" == "true" ]]; then
            expected+=("engine-win-cuda-x64")
          fi
          for name in "${expected[@]}"; do
            if [[ ! -d "dist/$name" ]]; then
              echo "Missing expected artifact directory: dist/$name"
              ls -la dist || true
              exit 1
            fi
          done

      - name: Collect Release Assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          safe_tag="$(echo "$RELEASE_TAG" | tr ' /' '--')"
          release_prefix="Openresearchtools-Engine-${safe_tag}"
          win_vulkan_asset="${release_prefix}-windows-x64-vulkan.zip"
          macos_metal_asset="${release_prefix}-macos-arm64-metal.zip"
          ubuntu_vulkan_asset="${release_prefix}-ubuntu-x64-vulkan.tar.gz"
          win_cuda_asset="${release_prefix}-windows-x64-cuda.zip"

          if [[ "$INCLUDE_CUDA" == "true" ]]; then
            (cd dist/engine-win-cuda-x64 && zip -r "../../release-assets/${win_cuda_asset}" .)
          fi
          (cd dist/engine-win-vulkan-x64 && zip -r "../../release-assets/${win_vulkan_asset}" .)
          (cd dist/engine-macos-arm64-metal && zip -r "../../release-assets/${macos_metal_asset}" .)
          tar -C dist/engine-ubuntu-x64-vulkan -czf "release-assets/${ubuntu_vulkan_asset}" .

          sha256sum release-assets/* > release-assets/SHA256SUMS.txt

      - name: Generate Runtime Manifest
        shell: bash
        run: |
          set -euo pipefail
          safe_tag="$(echo "$RELEASE_TAG" | tr ' /' '--')"
          release_prefix="Openresearchtools-Engine-${safe_tag}"
          win_vulkan_asset="${release_prefix}-windows-x64-vulkan.zip"
          macos_metal_asset="${release_prefix}-macos-arm64-metal.zip"
          ubuntu_vulkan_asset="${release_prefix}-ubuntu-x64-vulkan.tar.gz"
          win_cuda_asset="${release_prefix}-windows-x64-cuda.zip"
          generated_at="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          RELEASE_TAG="$RELEASE_TAG" \
          GITHUB_REPOSITORY="$GITHUB_REPOSITORY" \
          INCLUDE_CUDA="$INCLUDE_CUDA" \
          WIN_VULKAN_ASSET="$win_vulkan_asset" \
          MACOS_METAL_ASSET="$macos_metal_asset" \
          UBUNTU_VULKAN_ASSET="$ubuntu_vulkan_asset" \
          WIN_CUDA_ASSET="$win_cuda_asset" \
          GENERATED_AT="$generated_at" \
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          repo = os.environ["GITHUB_REPOSITORY"]
          tag = os.environ["RELEASE_TAG"]
          include_cuda = os.environ.get("INCLUDE_CUDA", "").lower() == "true"
          generated_at = os.environ["GENERATED_AT"]
          dist_dir = Path("release-assets")
          sha_file = dist_dir / "SHA256SUMS.txt"
          sha = {}
          if sha_file.exists():
              for line in sha_file.read_text(encoding="utf-8").splitlines():
                  line = line.strip()
                  if not line:
                      continue
                  parts = line.split(maxsplit=1)
                  if len(parts) != 2:
                      continue
                  digest, name = parts
                  sha[Path(name).name] = digest

          assets = []

          def add_asset(asset_id, platform, backend, archive, filename):
              path = dist_dir / filename
              if not path.exists():
                  return
              assets.append(
                  {
                      "id": asset_id,
                      "platform": platform,
                      "backend": backend,
                      "archive": archive,
                      "file_name": filename,
                      "url": f"https://github.com/{repo}/releases/download/{tag}/{filename}",
                      "sha256": sha.get(filename, ""),
                  }
              )

          add_asset(
              "windows-x64-vulkan",
              "windows-x64",
              "vulkan",
              "zip",
              os.environ["WIN_VULKAN_ASSET"],
          )
          add_asset(
              "macos-arm64-metal",
              "macos-arm64",
              "metal",
              "zip",
              os.environ["MACOS_METAL_ASSET"],
          )
          add_asset(
              "ubuntu-x64-vulkan",
              "ubuntu-x64",
              "vulkan",
              "tar.gz",
              os.environ["UBUNTU_VULKAN_ASSET"],
          )
          if include_cuda:
              add_asset(
                  "windows-x64-cuda",
                  "windows-x64",
                  "cuda",
                  "zip",
                  os.environ["WIN_CUDA_ASSET"],
              )

          manifest = {
              "schema_version": 1,
              "project": "Openresearchtools-Engine",
              "repository": repo,
              "tag": tag,
              "generated_at": generated_at,
              "release_url": f"https://github.com/{repo}/releases/tag/{tag}",
              "assets": assets,
          }

          (dist_dir / "engine-manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Generate Release Notes
        shell: bash
        run: |
          set -euo pipefail
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}"
          safe_tag="$(echo "$RELEASE_TAG" | tr ' /' '--')"
          release_prefix="Openresearchtools-Engine-${safe_tag}"
          win_vulkan_asset="${release_prefix}-windows-x64-vulkan.zip"
          macos_metal_asset="${release_prefix}-macos-arm64-metal.zip"
          ubuntu_vulkan_asset="${release_prefix}-ubuntu-x64-vulkan.tar.gz"
          win_cuda_asset="${release_prefix}-windows-x64-cuda.zip"
          {
            echo "# ${RELEASE_TITLE}"
            echo
            echo "## Downloads"
            echo
            echo "| System | Backend | Asset | Download |"
            echo "|---|---|---|---|"
            if [[ "$INCLUDE_CUDA" == "true" ]]; then
              echo "| Windows x64 | CUDA 13.1 + CPU | \`${win_cuda_asset}\` | [Download](${base_url}/${win_cuda_asset}) |"
            fi
            echo "| Windows x64 | Vulkan + CPU | \`${win_vulkan_asset}\` | [Download](${base_url}/${win_vulkan_asset}) |"
            echo "| macOS arm64 (Apple Silicon) | Metal (GPU) | \`${macos_metal_asset}\` | [Download](${base_url}/${macos_metal_asset}) |"
            echo "| Ubuntu x64 | Vulkan + CPU | \`${ubuntu_vulkan_asset}\` | [Download](${base_url}/${ubuntu_vulkan_asset}) |"
            echo "| Runtime manifest | Metadata JSON | \`engine-manifest.json\` | [Download](${base_url}/engine-manifest.json) |"
            echo "| Checksums | SHA256 | \`SHA256SUMS.txt\` | [Download](${base_url}/SHA256SUMS.txt) |"
            echo
            echo "## Runtime Notes"
            echo
            echo "- Windows and Ubuntu builds include CPU runtime support."
            if [[ "$INCLUDE_CUDA" == "true" ]]; then
              echo "- Windows CUDA build includes CUDA 13.1 runtime components. If your GPU or driver does not support CUDA 13.1, use the Windows Vulkan build instead."
            fi
            echo "- macOS build supports Apple Silicon only (M1, M2, M3, M4 and newer Arm-based Macs) and is distributed as a Metal-focused GPU build that leverages unified memory."
            echo "- Vulkan builds are GPU vendor-agnostic and can be a better fallback across mixed hardware."
          } > release-notes.md

      - name: Create or Update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          prerelease_args=()
          if [[ "$RELEASE_PRERELEASE" == "true" ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          else
            gh release create "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "$RELEASE_TITLE" \
              --notes-file release-notes.md \
              "${prerelease_args[@]}"
          fi

          gh release upload "$RELEASE_TAG" release-assets/* --clobber
