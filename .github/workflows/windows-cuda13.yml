name: Build Windows x64 CUDA 13.1 Bundle

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/windows-cuda13.yml"
      - "build/**"
      - "bridge/**"
      - "diarize/**"
      - "engine/**"
      - "pdf/**"
      - "pdfvlm/**"
      - "third_party/licenses/**"
      - "third_party/llama.cpp/**"
      - "third_party/whisper.cpp/**"
      - "Cargo.toml"
      - "Cargo.lock"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-cuda13:
    runs-on: windows-2022
    timeout-minutes: 240
    env:
      CUDA_VERSION: "13.1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Long Paths
        shell: pwsh
        run: |
          git config --global core.longpaths true

      - name: Resolve Build Paths
        shell: pwsh
        run: |
          $buildRoot = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE "..\ENGINEbuilds\gha-win-cuda13.1"))
          "BUILD_ROOT=$buildRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "BUILD_ROOT=$buildRoot"

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Ninja
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Setup CUDA Toolkit
        uses: ./third_party/llama.cpp/.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ env.CUDA_VERSION }}

      - name: Build Full Stack Bundle
        shell: pwsh
        run: |
          .\build\build_full_stack_cuda.ps1 `
            -CmakeConfig Release `
            -CargoProfile Release `
            -BuildRoot $env:BUILD_ROOT `
            -PrepareLlamaSource $false `
            -ApplyDiarizeOverlay $true `
            -BuildWhisperCli $false `
            -EnableFfmpeg `
            -EnableCpuAllVariants $true `
            -StageCudaRuntime $false

      - name: Validate Bundle Contents
        shell: pwsh
        run: |
          $bundle = Join-Path $env:BUILD_ROOT "bundle"
          if (-not (Test-Path -LiteralPath $bundle)) {
              throw "Bundle folder not found: $bundle"
          }

          $requiredFiles = @(
              "engine.exe",
              "pdf.dll",
              "pdfvlm.dll",
              "pdfium.dll",
              "LICENSE-ENGINE.txt",
              "LICENSES.txt",
              "THIRD_PARTY_NOTICES.md"
          )
          foreach ($required in $requiredFiles) {
              if (-not (Test-Path -LiteralPath (Join-Path $bundle $required))) {
                  throw "Missing required bundle file: $required"
              }
          }

          $bridge = Get-ChildItem -Path $bundle -File -Filter "llama-server-bridge.dll" -ErrorAction SilentlyContinue
          if (-not $bridge) {
              throw "Missing llama-server-bridge.dll in bundle."
          }

          $cpuVariants = Get-ChildItem -Path $bundle -File -Filter "ggml-cpu-*.dll" -ErrorAction SilentlyContinue
          if (-not $cpuVariants -or $cpuVariants.Count -eq 0) {
              throw "No ggml CPU variant DLLs found in bundle (expected ggml-cpu-*.dll)."
          }

          $ffmpegPrefixes = @("avcodec", "avformat", "avutil", "swresample", "swscale")
          foreach ($prefix in $ffmpegPrefixes) {
              $matches = Get-ChildItem -Path $bundle -File -Filter "$prefix*.dll" -ErrorAction SilentlyContinue
              if (-not $matches) {
                  throw "Missing FFmpeg runtime DLL matching $prefix*.dll"
              }
          }

          $unexpectedCudaRuntime = Get-ChildItem -Path $bundle -File -Filter "cublas*.dll" -ErrorAction SilentlyContinue
          if ($unexpectedCudaRuntime) {
              throw "CUDA runtime DLLs were bundled unexpectedly (cublas*). StageCudaRuntime should be OFF."
          }

          Write-Host "Bundle validation passed."

      - name: Pack Bundle
        shell: pwsh
        run: |
          $bundle = Join-Path $env:BUILD_ROOT "bundle"
          $zipPath = Join-Path $env:BUILD_ROOT "engine-win-cuda-13.1-x64-bundle.zip"
          if (Test-Path -LiteralPath $zipPath) {
              Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $bundle "*") -DestinationPath $zipPath -CompressionLevel Optimal
          "BUNDLE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Packed: $zipPath"

      - name: Upload Bundle Artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-win-cuda-13.1-x64-bundle
          path: ${{ env.BUNDLE_ZIP }}
          if-no-files-found: error
