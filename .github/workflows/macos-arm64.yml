name: Build macOS arm64 Backend
run-name: Build macOS arm64 Backend - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to build
        required: true
        type: choice
        options:
          - metal
        default: metal
  workflow_call:
    inputs:
      backend:
        description: Backend to build
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.backend }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  macos-arm64:
    runs-on: macos-14
    timeout-minutes: 300
    env:
      BACKEND: ${{ inputs.backend }}
      FFMPEG_TAG: "n8.0.1"
      FFMPEG_SHA: "894da5ca7d742e4429ffb2af534fcda0103ef593"
      PDFIUM_RELEASE_API: "https://api.github.com/repos/bblanchon/pdfium-binaries/releases/latest"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Preflight Required License Files
        shell: bash
        run: |
          set -euo pipefail
          required=(
            "third_party/licenses/pdfium-LICENSE.txt"
            "third_party/licenses/pdfium-binaries-LICENSE.txt"
            "third_party/licenses/ffmpeg-LGPL-2.1.txt"
            "third_party/licenses/ffmpeg-SOURCE-macos-arm64.txt"
            "third_party/licenses/LICENSES.txt"
            "third_party/licenses/LICENSES-vulkan.txt"
            "third_party/licenses/LICENSES-metal.txt"
          )
          for f in "${required[@]}"; do
            [[ -f "$f" ]] || { echo "Missing required preflight file: $f"; exit 1; }
          done

      - name: Resolve Build Paths
        shell: bash
        run: |
          set -euo pipefail
          build_root="$(cd "$GITHUB_WORKSPACE/.." && pwd)/ENGINEbuilds/gha-macos-arm64-${BACKEND}"
          echo "BUILD_ROOT=$build_root" >> "$GITHUB_ENV"
          echo "Resolved BUILD_ROOT=$build_root"

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Build Dependencies
        shell: bash
        run: |
          set -euo pipefail
          brew update
          brew install ninja nasm pkg-config

      - name: Build FFmpeg (macOS arm64 LGPL shared, pinned)
        shell: bash
        run: |
          set -euo pipefail
          ffmpeg_src="$BUILD_ROOT/sources/ffmpeg"
          ffmpeg_out="$BUILD_ROOT/runtime-deps/ffmpeg"
          rm -rf "$ffmpeg_src" "$ffmpeg_out"
          mkdir -p "$(dirname "$ffmpeg_src")" "$ffmpeg_out"

          git clone --depth 1 --branch "$FFMPEG_TAG" https://github.com/FFmpeg/FFmpeg "$ffmpeg_src"
          actual_sha="$(git -C "$ffmpeg_src" rev-parse "HEAD^{commit}")"
          if [[ "$actual_sha" != "$FFMPEG_SHA" ]]; then
            echo "Pinned SHA mismatch. Expected $FFMPEG_SHA, got $actual_sha"
            exit 1
          fi

          pushd "$ffmpeg_src"
          ./configure \
            --prefix="$ffmpeg_out" \
            --enable-shared \
            --disable-static \
            --disable-gpl \
            --disable-version3 \
            --disable-nonfree \
            --disable-autodetect \
            --disable-xlib \
            --disable-libxcb \
            --disable-libxcb-shm \
            --disable-libxcb-xfixes \
            --disable-libxcb-shape \
            --disable-vulkan \
            --disable-libplacebo \
            --enable-pic \
            --disable-programs \
            --disable-doc \
            --cc=clang \
            --arch=arm64 \
            --target-os=darwin
          make -j"$(sysctl -n hw.ncpu)"
          make install
          popd

      - name: Fetch PDFium (macOS arm64)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pdfium_root="$BUILD_ROOT/runtime-deps/pdfium"
          rm -rf "$pdfium_root"
          mkdir -p "$pdfium_root"

          asset_url="$(python3 - <<'PY'
          import json
          import os
          import urllib.request

          api = os.environ["PDFIUM_RELEASE_API"]
          token = os.environ.get("GH_TOKEN", "")
          headers = {
              "Accept": "application/vnd.github+json",
              "User-Agent": "ENGINE-pdfium-fetch",
          }
          if token:
              headers["Authorization"] = f"Bearer {token}"

          req = urllib.request.Request(api, headers=headers)
          with urllib.request.urlopen(req) as resp:
              release = json.load(resp)

          urls = [
              a.get("browser_download_url")
              for a in release.get("assets", [])
              if a.get("name") == "pdfium-mac-arm64.tgz"
          ]
          print(urls[0] if urls else "")
          PY
          )"
          if [[ -z "$asset_url" ]]; then
            echo "Could not find asset pdfium-mac-arm64.tgz in latest release"
            exit 1
          fi

          archive="$RUNNER_TEMP/pdfium-mac-arm64.tgz"
          curl -L --fail "$asset_url" -o "$archive"
          tar -xzf "$archive" -C "$pdfium_root"

          pdfium_lib="$(find "$pdfium_root" -type f -name "libpdfium.dylib" | head -n1 || true)"
          if [[ -z "$pdfium_lib" ]]; then
            echo "libpdfium.dylib was not found under $pdfium_root"
            exit 1
          fi
          echo "PDFIUM_LIB=$pdfium_lib" >> "$GITHUB_ENV"
          echo "Resolved PDFIUM_LIB=$pdfium_lib"

      - name: Prepare Patched llama Source
        shell: bash
        run: |
          set -euo pipefail
          python3 "$GITHUB_WORKSPACE/build/prepare_llama_source_from_patch.py" \
            --repo-root "$GITHUB_WORKSPACE" \
            --out-dir "$BUILD_ROOT/llama-src" \
            --force

      - name: Configure and Build llama Bridge
        shell: bash
        run: |
          set -euo pipefail
          llama_src="$BUILD_ROOT/llama-src"
          llama_build="$BUILD_ROOT/llama-build"
          ffmpeg_root="$BUILD_ROOT/runtime-deps/ffmpeg"

          rm -rf "$llama_build"
          mkdir -p "$llama_build"

          cmake_args=(
            -S "$llama_src"
            -B "$llama_build"
            -G Ninja
            -DCMAKE_BUILD_TYPE=Release
            -DBUILD_SHARED_LIBS=ON
            -DLLAMA_BUILD_SERVER=ON
            -DLLAMA_BUILD_MARKDOWN_BRIDGE=ON
            -DLLAMA_HTTPLIB=ON
            -DLLAMA_OPENSSL=OFF
            -DLLAMA_BUILD_BORINGSSL=OFF
            -DLLAMA_BUILD_LIBRESSL=OFF
            -DLLAMA_SERVER_BRIDGE_ENABLE_FFMPEG=ON
            -DLLAMA_SERVER_BRIDGE_FFMPEG_ROOT="$ffmpeg_root"
            -DGGML_NATIVE=OFF
          )
          cmake_args+=(-DGGML_METAL=ON)

          cmake "${cmake_args[@]}"
          cmake --build "$llama_build" --parallel --target llama-server-bridge

      - name: Build Rust Runtime
        shell: bash
        run: |
          set -euo pipefail
          bridge_dir="$(dirname "$(find "$BUILD_ROOT/llama-build" -type f -name "libllama-server-bridge.dylib" | head -n1)")"
          if [[ -z "$bridge_dir" ]]; then
            echo "libllama-server-bridge.dylib not found after CMake build"
            exit 1
          fi

          export LIBRARY_PATH="$bridge_dir:${LIBRARY_PATH:-}"
          export DYLD_LIBRARY_PATH="$bridge_dir:${DYLD_LIBRARY_PATH:-}"
          export CARGO_TARGET_DIR="$BUILD_ROOT/cargo-target"

          cargo build --release -p pdf -p pdfvlm -p engine

      - name: Stage Bundle
        shell: bash
        run: |
          set -euo pipefail
          bundle="$BUILD_ROOT/bundle"
          bundle_licenses="$bundle/licenses"
          bundle_vendor="$bundle/vendor"
          bundle_pdfium="$bundle_vendor/pdfium"
          bundle_ffmpeg_root="$bundle_vendor/ffmpeg"
          bundle_ffmpeg="$bundle_vendor/ffmpeg/lib"
          cargo_release="$BUILD_ROOT/cargo-target/release"

          rm -rf "$bundle"
          mkdir -p "$bundle" "$bundle_licenses" "$bundle_pdfium" "$bundle_ffmpeg"

          cp "$cargo_release/engine" "$bundle/engine"
          cp "$cargo_release/libpdf.dylib" "$bundle/libpdf.dylib"
          cp "$cargo_release/libpdfvlm.dylib" "$bundle/libpdfvlm.dylib"

          # Keep bridge/llama/ggml dylibs at bundle root and preserve symlink aliases
          # (e.g. libfoo.0.dylib -> libfoo.0.0.0.dylib) for stable loader resolution.
          llama_lib_dir="$BUILD_ROOT/llama-build/bin"
          [[ -d "$llama_lib_dir" ]] || { echo "Missing llama build output dir: $llama_lib_dir"; exit 1; }
          while IFS= read -r -d '' lib; do
            cp -a "$lib" "$bundle/$(basename "$lib")"
          done < <(find "$llama_lib_dir" \( \
            -name "libllama-server-bridge*.dylib" -o \
            -name "libllama*.dylib" -o \
            -name "libggml*.dylib" -o \
            -name "libmtmd*.dylib" \
          \) -print0)

          cp -L "$PDFIUM_LIB" "$bundle_pdfium/$(basename "$PDFIUM_LIB")"

          for name in avcodec avformat avutil swresample swscale; do
            found=0
            while IFS= read -r -d '' src; do
              cp -a "$src" "$bundle_ffmpeg/$(basename "$src")"
              found=1
            done < <(find "$BUILD_ROOT/runtime-deps/ffmpeg/lib" -name "lib${name}*.dylib" -print0)
            if [[ "$found" -eq 0 ]]; then
              echo "Missing FFmpeg runtime dylib for lib${name}"
              exit 1
            fi
          done

          mkdir -p "$bundle_licenses/third_party"
          for f in "$GITHUB_WORKSPACE"/third_party/licenses/*; do
            [[ -f "$f" ]] || continue
            base="$(basename "$f")"
            case "$base" in
              torch-LICENSE.txt|torch-NOTICE.txt|torchaudio-LICENSE.txt|numpy-LICENSE.txt|ffmpeg-SOURCE*.txt|nvidia-cuda-EULA.txt|nvidia-cuda-runtime-NOTICE.txt)
                continue
                ;;
            esac
            cp "$f" "$bundle_licenses/third_party/$base"
          done

          rm -rf "$bundle_licenses/rust-full"
          cp -R "$GITHUB_WORKSPACE/third_party/licenses/rust-full" "$bundle_licenses/rust-full"
          cp "$GITHUB_WORKSPACE/LICENSE" "$bundle/LICENSE-ENGINE.txt"

          # Select backend-appropriate key license bundle.
          # macOS metal backend is non-CUDA and should not stage CUDA EULA notices.
          key_profile="$BACKEND"
          selected_key=""
          for candidate in "LICENSES-${key_profile}.txt" "LICENSES-vulkan.txt" "LICENSES.txt"; do
            candidate_path="$GITHUB_WORKSPACE/third_party/licenses/$candidate"
            if [[ -f "$candidate_path" ]]; then
              selected_key="$candidate_path"
              break
            fi
          done
          if [[ -z "$selected_key" ]]; then
            echo "No key LICENSES file found for profile '$key_profile'"
            exit 1
          fi
          cp "$selected_key" "$bundle_licenses/LICENSES.txt"

          printf '%s\n' \
            '# Third-Party Notices' \
            '' \
            'This bundle includes third-party software.' \
            '' \
            'Key combined license text:' \
            '' \
            '- ./LICENSES.txt' \
            '' \
            'Bundled license folders:' \
            '' \
            '- ./third_party/' \
            '- ./rust-full/' \
            '- ../vendor/pdfium/' \
            '- ../vendor/ffmpeg/' \
            '' \
            'Project license:' \
            '' \
            '- ../LICENSE-ENGINE.txt' \
            '' \
            'Full license inventory (including transitive/tooling exports):' \
            '' \
            '- https://github.com/openresearchtools/engine/tree/main/third_party/licenses' \
            > "$bundle_licenses/THIRD_PARTY_NOTICES.md"

          copy_license_files() {
            src_root="$1"
            dst_root="$2"
            mkdir -p "$dst_root"
            while IFS= read -r -d '' file; do
              rel="${file#$src_root/}"
              mkdir -p "$dst_root/$(dirname "$rel")"
              cp -L "$file" "$dst_root/$rel"
            done < <(find "$src_root" -type f \( \
              -iname '*LICENSE*' -o \
              -iname '*LICENCE*' -o \
              -iname '*COPYING*' -o \
              -iname '*COPYRIGHT*' -o \
              -iname '*NOTICE*' -o \
              -iname '*PATENTS*' -o \
              -iname '*EULA*' -o \
              -iname '*SOURCE*' \
            \) -print0)
          }

          copy_license_files "$BUILD_ROOT/runtime-deps/pdfium" "$bundle_pdfium"
          copy_license_files "$BUILD_ROOT/runtime-deps/ffmpeg" "$bundle_ffmpeg_root"

          # Always include authoritative PDFium license texts from this repo.
          pdfium_primary="$GITHUB_WORKSPACE/third_party/licenses/pdfium-LICENSE.txt"
          pdfium_source="$GITHUB_WORKSPACE/third_party/licenses/pdfium-binaries-LICENSE.txt"
          [[ -f "$pdfium_primary" ]] || { echo "Missing required PDFium license file: $pdfium_primary"; exit 1; }
          [[ -f "$pdfium_source" ]] || { echo "Missing required PDFium source-license file: $pdfium_source"; exit 1; }
          cp "$pdfium_primary" "$bundle_pdfium/pdfium-LICENSE.txt"
          cp "$pdfium_source" "$bundle_pdfium/pdfium-binaries-LICENSE.txt"

          ffmpeg_source_notice="$GITHUB_WORKSPACE/third_party/licenses/ffmpeg-SOURCE-macos-arm64.txt"
          if [[ ! -f "$ffmpeg_source_notice" ]]; then
            ffmpeg_source_notice="$GITHUB_WORKSPACE/third_party/licenses/ffmpeg-SOURCE.txt"
          fi
          if [[ -f "$ffmpeg_source_notice" ]]; then
            cp "$ffmpeg_source_notice" "$bundle_ffmpeg_root/ffmpeg-SOURCE.txt"
          fi

          # Source FFmpeg installs may not contain copied license files.
          # Ensure bundle/vendor/ffmpeg is never missing license texts.
          if ! find "$bundle_ffmpeg_root" -type f \( -iname '*LICENSE*' -o -iname '*LICENCE*' -o -iname '*COPYING*' -o -iname '*COPYRIGHT*' -o -iname '*NOTICE*' -o -iname '*PATENTS*' -o -iname '*EULA*' -o -iname '*SOURCE*' \) | grep -q .; then
            ffmpeg_lgpl="$GITHUB_WORKSPACE/third_party/licenses/ffmpeg-LGPL-2.1.txt"
            ffmpeg_source="$GITHUB_WORKSPACE/third_party/licenses/ffmpeg-SOURCE-macos-arm64.txt"
            if [[ ! -f "$ffmpeg_source" ]]; then
              ffmpeg_source="$GITHUB_WORKSPACE/third_party/licenses/ffmpeg-SOURCE.txt"
            fi
            [[ -f "$ffmpeg_lgpl" ]] || { echo "Missing fallback FFmpeg license file: $ffmpeg_lgpl"; exit 1; }
            [[ -f "$ffmpeg_source" ]] || { echo "Missing fallback FFmpeg source notice file: $ffmpeg_source"; exit 1; }
            cp "$ffmpeg_lgpl" "$bundle_ffmpeg_root/ffmpeg-LGPL-2.1.txt"
            cp "$ffmpeg_source" "$bundle_ffmpeg_root/ffmpeg-SOURCE.txt"
          fi

      - name: Fixup and Verify Mach-O Load Paths
        shell: bash
        run: |
          set -euo pipefail
          bundle="$BUILD_ROOT/bundle"
          ffmpeg_dir="$bundle/vendor/ffmpeg/lib"
          pdfium_dir="$bundle/vendor/pdfium"
          macho_files="$RUNNER_TEMP/macho-files.txt"
          dylib_files="$RUNNER_TEMP/macho-dylib-files.txt"

          : > "$macho_files"
          : > "$dylib_files"

          echo "$bundle/engine" >> "$macho_files"

          find "$bundle" -maxdepth 1 -type f -name "*.dylib" -print >> "$macho_files"
          find "$bundle" -maxdepth 1 -type f -name "*.dylib" -print >> "$dylib_files"
          find "$ffmpeg_dir" -type f -name "*.dylib" -print >> "$macho_files"
          find "$ffmpeg_dir" -type f -name "*.dylib" -print >> "$dylib_files"
          find "$pdfium_dir" -type f -name "*.dylib" -print >> "$macho_files"
          find "$pdfium_dir" -type f -name "*.dylib" -print >> "$dylib_files"

          sort -u "$macho_files" -o "$macho_files"
          sort -u "$dylib_files" -o "$dylib_files"

          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            base="$(basename "$file")"
            install_name_tool -id "@loader_path/$base" "$file"
          done < "$dylib_files"

          resolve_bundled_target() {
            local dep_base="$1"
            if [[ -f "$bundle/$dep_base" ]]; then
              echo "$bundle/$dep_base"
              return
            fi
            if [[ -f "$ffmpeg_dir/$dep_base" ]]; then
              echo "$ffmpeg_dir/$dep_base"
              return
            fi
            if [[ -f "$pdfium_dir/$dep_base" ]]; then
              echo "$pdfium_dir/$dep_base"
              return
            fi
          }

          to_loader_path() {
            local from_file="$1"
            local to_file="$2"
            python3 -c 'import os,sys; from_dir=os.path.dirname(os.path.abspath(sys.argv[1])); to_path=os.path.abspath(sys.argv[2]); rel=os.path.relpath(to_path, from_dir).replace("\\\\","/"); print(f"@loader_path/{rel}")' "$from_file" "$to_file"
          }

          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            while IFS= read -r dep; do
              [[ -n "$dep" ]] || continue
              dep_base="$(basename "$dep")"
              target="$(resolve_bundled_target "$dep_base" || true)"
              if [[ -n "$target" ]]; then
                new_dep="$(to_loader_path "$file" "$target")"
                if [[ "$dep" != "$new_dep" ]]; then
                  install_name_tool -change "$dep" "$new_dep" "$file"
                fi
              fi
            done < <(otool -L "$file" | awk 'NR > 1 { print $1 }')
          done < "$macho_files"

          while IFS= read -r file; do
            [[ -n "$file" ]] || continue
            deps="$(otool -L "$file" | awk 'NR > 1 { print $1 }')"
            if printf '%s\n' "$deps" | grep -F "$BUILD_ROOT" >/dev/null; then
              echo "Found non-relocatable dependency path using BUILD_ROOT in $file"
              otool -L "$file"
              exit 1
            fi
            if printf '%s\n' "$deps" | grep -F "$GITHUB_WORKSPACE" >/dev/null; then
              echo "Found non-relocatable dependency path using GITHUB_WORKSPACE in $file"
              otool -L "$file"
              exit 1
            fi
            if printf '%s\n' "$deps" | grep -F "/runtime-deps/" >/dev/null; then
              echo "Found leaked runtime-deps dependency path in $file"
              otool -L "$file"
              exit 1
            fi
            unexpected="$(printf '%s\n' "$deps" | awk '
              $1 ~ /^@loader_path\// { next }
              $1 ~ /^\/System\/Library\// { next }
              $1 ~ /^\/usr\/lib\// { next }
              { print }
            ')"
            if [[ -n "$unexpected" ]]; then
              echo "Found unexpected dependency path(s) in $file:"
              printf '%s\n' "$unexpected"
              otool -L "$file"
              exit 1
            fi
          done < "$macho_files"

          otool -L "$bundle/engine"
          bridge_lib="$(ls "$bundle"/libllama-server-bridge*.dylib | head -n1)"
          otool -L "$bridge_lib"

      - name: Validate Bundle Contents
        shell: bash
        run: |
          set -euo pipefail
          bundle="$BUILD_ROOT/bundle"
          [[ -d "$bundle" ]] || { echo "Bundle folder not found: $bundle"; exit 1; }

          required=(
            "engine"
            "libpdf.dylib"
            "libpdfvlm.dylib"
            "vendor/pdfium/libpdfium.dylib"
            "LICENSE-ENGINE.txt"
            "licenses/LICENSES.txt"
            "licenses/THIRD_PARTY_NOTICES.md"
          )
          for f in "${required[@]}"; do
            [[ -f "$bundle/$f" ]] || { echo "Missing required bundle file: $f"; exit 1; }
          done

          ls "$bundle"/libllama-server-bridge*.dylib >/dev/null 2>&1 || { echo "Missing libllama-server-bridge*.dylib"; exit 1; }
          ls "$bundle"/libggml-cpu*.dylib >/dev/null 2>&1 || { echo "Missing libggml-cpu*.dylib"; exit 1; }
          ls "$bundle"/libggml-metal*.dylib >/dev/null 2>&1 || { echo "Missing libggml-metal*.dylib for metal backend"; exit 1; }

          ffmpeg_dir="$bundle/vendor/ffmpeg/lib"
          [[ -d "$ffmpeg_dir" ]] || { echo "Missing FFmpeg vendor directory: $ffmpeg_dir"; exit 1; }
          for lib in avcodec avformat avutil swresample swscale; do
            ls "$ffmpeg_dir"/lib${lib}*.dylib >/dev/null 2>&1 || { echo "Missing FFmpeg runtime dylib: lib${lib}*.dylib"; exit 1; }
          done

          if [[ -d "$bundle/licenses/ffmpeg" ]]; then
            echo "Legacy folder should not exist: $bundle/licenses/ffmpeg"
            exit 1
          fi
          if [[ -d "$bundle/licenses/pdfium" ]]; then
            echo "Legacy folder should not exist: $bundle/licenses/pdfium"
            exit 1
          fi

          ffmpeg_licenses="$bundle/vendor/ffmpeg"
          [[ -d "$ffmpeg_licenses" ]] || { echo "Missing FFmpeg vendor directory: $ffmpeg_licenses"; exit 1; }
          find "$ffmpeg_licenses" -type f \( -iname '*LICENSE*' -o -iname '*LICENCE*' -o -iname '*COPYING*' -o -iname '*COPYRIGHT*' -o -iname '*NOTICE*' -o -iname '*PATENTS*' -o -iname '*EULA*' -o -iname '*SOURCE*' \) | grep -q . || { echo "No FFmpeg license files found in $ffmpeg_licenses"; exit 1; }

          pdfium_licenses="$bundle/vendor/pdfium"
          [[ -d "$pdfium_licenses" ]] || { echo "Missing PDFium vendor directory: $pdfium_licenses"; exit 1; }
          find "$pdfium_licenses" -type f \( -iname '*LICENSE*' -o -iname '*LICENCE*' -o -iname '*COPYING*' -o -iname '*COPYRIGHT*' -o -iname '*NOTICE*' -o -iname '*PATENTS*' -o -iname '*EULA*' -o -iname '*SOURCE*' \) | grep -q . || { echo "No PDFium license files found in $pdfium_licenses"; exit 1; }
          [[ -f "$bundle/vendor/pdfium/pdfium-LICENSE.txt" ]] || { echo "Missing required PDFium license text: vendor/pdfium/pdfium-LICENSE.txt"; exit 1; }
          [[ -f "$bundle/vendor/pdfium/pdfium-binaries-LICENSE.txt" ]] || { echo "Missing required PDFium binaries license text: vendor/pdfium/pdfium-binaries-LICENSE.txt"; exit 1; }

          if grep -Eiq "nvidia-cuda-EULA|nvidia-cuda-runtime-NOTICE" "$bundle/licenses/LICENSES.txt"; then
            echo "Non-CUDA macOS bundle staged CUDA key-license entries in licenses/LICENSES.txt"
            exit 1
          fi

      - name: Smoke Test Bundle Runtime
        shell: bash
        run: |
          set -euo pipefail
          bundle="$BUILD_ROOT/bundle"
          smoke_out="$RUNNER_TEMP/engine-list-devices.txt"

          cd "$bundle"
          chmod +x ./engine
          unset DYLD_LIBRARY_PATH
          ./engine list-devices > "$smoke_out" 2>&1 || {
            cat "$smoke_out"
            echo "engine list-devices failed"
            exit 1
          }
          cat "$smoke_out"

          grep -q "devices_count=" "$smoke_out" || {
            echo "Unexpected list-devices output (missing devices_count)"
            exit 1
          }

          if ! grep -Eiq "metal|backend=.*metal" "$smoke_out"; then
            echo "Metal backend was requested but not reported by list-devices output."
            exit 1
          fi

          BUNDLE_ROOT="$bundle" python3 - <<'PY'
          import ctypes
          import glob
          import os

          bundle = os.environ["BUNDLE_ROOT"]
          mode = getattr(os, "RTLD_NOW", None)
          bridge = sorted(glob.glob(os.path.join(bundle, "libllama-server-bridge*.dylib")))
          if not bridge:
              raise SystemExit("Missing libllama-server-bridge*.dylib for ctypes smoke test")
          targets = [
              bridge[0],
              os.path.join(bundle, "libpdf.dylib"),
              os.path.join(bundle, "libpdfvlm.dylib"),
          ]
          for path in targets:
              if not os.path.exists(path):
                  raise SystemExit(f"Missing smoke library: {path}")
              if mode is None:
                  ctypes.CDLL(path)
              else:
                  ctypes.CDLL(path, mode=mode)
          print("ctypes-load-ok")
          PY

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-macos-arm64-${{ inputs.backend }}
          path: ${{ env.BUILD_ROOT }}/bundle
          if-no-files-found: error
