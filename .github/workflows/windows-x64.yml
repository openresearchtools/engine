name: Build Windows x64 Backend
run-name: Build Windows x64 Backend - ${{ github.ref_name }}

on:
  workflow_dispatch:
    inputs:
      backend:
        description: Backend to build
        required: true
        type: choice
        options:
          - cuda
          - vulkan
        default: vulkan
  workflow_call:
    inputs:
      backend:
        description: Backend to build
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.backend }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-x64:
    runs-on: windows-2022
    timeout-minutes: 240
    env:
      CUDA_VERSION: "13.1"
      VULKAN_VERSION: "1.4.313.2"
      BACKEND: ${{ inputs.backend }}
      PDFIUM_RELEASE_TAG: "latest"
      FFMPEG_RELEASE_API: "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest"
      FFMPEG_ASSET_PATTERN: "*win64-lgpl-shared*.zip"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Long Paths
        shell: pwsh
        run: |
          git config --global core.longpaths true

      - name: Resolve Build Paths
        shell: pwsh
        run: |
          $buildRoot = [System.IO.Path]::GetFullPath((Join-Path $env:GITHUB_WORKSPACE "..\ENGINEbuilds\gha-win-$($env:BACKEND)-x64"))
          "BUILD_ROOT=$buildRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "BUILD_ROOT=$buildRoot"

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ninja
        shell: pwsh
        run: |
          choco install ninja -y

      - name: Setup CUDA Toolkit
        if: ${{ inputs.backend == 'cuda' }}
        uses: ./third_party/llama.cpp/.github/actions/windows-setup-cuda
        with:
          cuda_version: ${{ env.CUDA_VERSION }}

      - name: Setup Vulkan SDK
        if: ${{ inputs.backend == 'vulkan' }}
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "VulkanSDK-Installer.exe"
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkansdk-windows-X64-$env:VULKAN_VERSION.exe"
          curl.exe -o $installer -L $url
          & $installer --accept-licenses --default-answer --confirm-command install
          "VULKAN_SDK=C:\VulkanSDK\$env:VULKAN_VERSION" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "C:\VulkanSDK\$env:VULKAN_VERSION\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Full Stack Runtime
        shell: pwsh
        run: |
          $vcvarsCandidates = @(
              "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat",
              "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvarsall.bat",
              "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat",
              "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat"
          )
          $vcvars = $vcvarsCandidates | Where-Object { Test-Path -LiteralPath $_ } | Select-Object -First 1
          if ([string]::IsNullOrWhiteSpace($vcvars)) {
              throw "vcvarsall.bat not found in expected VS 2022 locations."
          }
          cmd /c "`"$vcvars`" x64 >nul && set" | ForEach-Object {
              if ($_ -match "^(.*?)=(.*)$") {
                  [System.Environment]::SetEnvironmentVariable($matches[1], $matches[2], "Process")
              }
          }

          $env:CMAKE_GENERATOR = "Ninja Multi-Config"
          if ($env:BACKEND -eq "cuda") {
              if ([string]::IsNullOrWhiteSpace($env:CUDA_PATH)) {
                  throw "CUDA_PATH is not set after CUDA setup action."
              }
              $env:CUDACXX = Join-Path $env:CUDA_PATH "bin\\nvcc.exe"
              if (-not (Test-Path -LiteralPath $env:CUDACXX)) {
                  throw "nvcc not found at $env:CUDACXX"
              }
          }

          $buildArgs = @{
            CmakeConfig        = "Release"
            Backend            = $env:BACKEND
            CargoProfile       = "Release"
            BuildRoot          = $env:BUILD_ROOT
            PrepareLlamaSource = $true
            BuildWhisperCli    = $false
            EnableFfmpeg       = $true
            EnableCpuAllVariants = $true
            StageCudaRuntime   = ($env:BACKEND -eq "cuda")
            PdfiumTag          = $env:PDFIUM_RELEASE_TAG
            FfmpegReleaseApiUrl = $env:FFMPEG_RELEASE_API
            FfmpegAssetPattern = $env:FFMPEG_ASSET_PATTERN
          }

          .\build\build_full_stack_cuda.ps1 @buildArgs

      - name: Validate Bundle Contents
        shell: pwsh
        run: |
          $bundle = Join-Path $env:BUILD_ROOT "bundle"
          if (-not (Test-Path -LiteralPath $bundle)) {
              throw "Bundle folder not found: $bundle"
          }

          $requiredFiles = @(
              "engine.exe",
              "pdf.dll",
              "pdfvlm.dll",
              "vendor\\pdfium\\pdfium.dll",
              "LICENSE-ENGINE.txt",
              "licenses\\LICENSES.txt",
              "licenses\\THIRD_PARTY_NOTICES.md"
          )
          foreach ($required in $requiredFiles) {
              if (-not (Test-Path -LiteralPath (Join-Path $bundle $required))) {
                  throw "Missing required bundle file: $required"
              }
          }

          $bridge = Get-ChildItem -Path $bundle -File -Filter "llama-server-bridge.dll" -ErrorAction SilentlyContinue
          if (-not $bridge) {
              throw "Missing llama-server-bridge.dll in bundle."
          }

          $cpuVariants = Get-ChildItem -Path $bundle -File -Filter "ggml-cpu-*.dll" -ErrorAction SilentlyContinue
          if (-not $cpuVariants -or $cpuVariants.Count -eq 0) {
              throw "No ggml CPU variant DLLs found in bundle (expected ggml-cpu-*.dll)."
          }

          $backendDllPrefix = if ($env:BACKEND -eq "cuda") { "ggml-cuda" } else { "ggml-vulkan" }
          $backendDlls = Get-ChildItem -Path $bundle -File -Filter "$backendDllPrefix*.dll" -ErrorAction SilentlyContinue
          if (-not $backendDlls -or $backendDlls.Count -eq 0) {
              throw "Missing backend runtime DLL matching $backendDllPrefix*.dll"
          }

          $ffmpegDir = Join-Path $bundle "vendor\\ffmpeg\\bin"
          if (-not (Test-Path -LiteralPath $ffmpegDir)) {
              throw "Missing FFmpeg vendor directory: $ffmpegDir"
          }

          $ffmpegPrefixes = @("avcodec", "avformat", "avutil", "swresample", "swscale")
          foreach ($prefix in $ffmpegPrefixes) {
              $matches = Get-ChildItem -Path $ffmpegDir -File -Filter "$prefix*.dll" -ErrorAction SilentlyContinue
              if (-not $matches) {
                  throw "Missing FFmpeg runtime DLL matching $prefix*.dll"
              }
          }

          $legacyLicenseDirs = @(
              "licenses\\ffmpeg",
              "licenses\\pdfium"
          )
          foreach ($legacyDir in $legacyLicenseDirs) {
              if (Test-Path -LiteralPath (Join-Path $bundle $legacyDir)) {
                  throw "Legacy license directory should not exist anymore: $legacyDir"
              }
          }

          $licenseRegex = '(?i)(LICENSE|LICENCE|COPYING|COPYRIGHT|NOTICE|PATENTS|EULA|SOURCE)'
          $vendorPdfiumDir = Join-Path $bundle "vendor\\pdfium"
          $pdfiumLicenseFiles = Get-ChildItem -Path $vendorPdfiumDir -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match $licenseRegex }
          if (-not $pdfiumLicenseFiles) {
              throw "No PDFium license files found under vendor\\pdfium"
          }

          $vendorFfmpegDir = Join-Path $bundle "vendor\\ffmpeg"
          $ffmpegLicenseFiles = Get-ChildItem -Path $vendorFfmpegDir -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Name -match $licenseRegex }
          if (-not $ffmpegLicenseFiles) {
              throw "No FFmpeg license files found under vendor\\ffmpeg"
          }
          $ffmpegSourceNotice = Join-Path $vendorFfmpegDir "ffmpeg-SOURCE.txt"
          if (-not (Test-Path -LiteralPath $ffmpegSourceNotice)) {
              throw "Missing FFmpeg source/provenance notice in vendor\\ffmpeg: ffmpeg-SOURCE.txt"
          }

          if ($env:BACKEND -eq "cuda") {
              $cudaRuntimePatterns = @("cublas64_*.dll", "cublasLt64_*.dll", "cudart64_*.dll")
              foreach ($pattern in $cudaRuntimePatterns) {
                  $matches = Get-ChildItem -Path $bundle -File -Filter $pattern -ErrorAction SilentlyContinue
                  if (-not $matches) {
                      throw "Missing CUDA runtime DLL matching $pattern in CUDA bundle."
                  }
              }
              $cudaNotice = Join-Path $bundle "NVIDIA-CUDA-RUNTIME-NOTICE.txt"
              if (-not (Test-Path -LiteralPath $cudaNotice)) {
                  throw "Missing CUDA runtime notice file in bundle root: NVIDIA-CUDA-RUNTIME-NOTICE.txt"
              }
          } else {
              $unexpectedCudaRuntime = @()
              $unexpectedCudaRuntime += Get-ChildItem -Path $bundle -File -Filter "cublas*.dll" -ErrorAction SilentlyContinue
              $unexpectedCudaRuntime += Get-ChildItem -Path $bundle -File -Filter "cudart*.dll" -ErrorAction SilentlyContinue
              if ($unexpectedCudaRuntime.Count -gt 0) {
                  throw "CUDA runtime DLLs were bundled unexpectedly for backend '$($env:BACKEND)'."
              }
              if (Test-Path -LiteralPath (Join-Path $bundle "NVIDIA-CUDA-RUNTIME-NOTICE.txt")) {
                  throw "CUDA runtime notice file was bundled unexpectedly for backend '$($env:BACKEND)'."
              }
          }

          Write-Host "Bundle validation passed."

      - name: Pack Runtime
        shell: pwsh
        run: |
          $bundle = Join-Path $env:BUILD_ROOT "bundle"
          $zipPath = Join-Path $env:BUILD_ROOT "engine-win-$($env:BACKEND)-x64.zip"
          if (-not (Test-Path -LiteralPath $bundle)) {
              throw "Bundle folder not found: $bundle"
          }
          if (Test-Path -LiteralPath $zipPath) {
              Remove-Item -LiteralPath $zipPath -Force
          }
          Compress-Archive -Path (Join-Path $bundle "*") -DestinationPath $zipPath -CompressionLevel Optimal
          if (-not (Test-Path -LiteralPath $zipPath)) {
              throw "Failed to create archive: $zipPath"
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: engine-win-${{ inputs.backend }}-x64
          path: ${{ env.BUILD_ROOT }}/engine-win-${{ inputs.backend }}-x64.zip
          if-no-files-found: error
